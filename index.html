<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Gastos</title>
<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-900 text-white p-6">

<!-- BOTÃO -->
<button onclick="toggleSidebar()"
class="fixed top-3 left-3 bg-gray-800 px-3 py-2 rounded z-50">☰</button>

<!-- OVERLAY -->
<div id="overlay" class="fixed inset-0 bg-black/50 hidden z-40"
onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar"
class="fixed top-0 left-0 w-72 h-full bg-gray-950 p-4 transform -translate-x-full transition z-50">

<h2 class="font-bold mb-4">⚙ Painel</h2>

<div class="bg-gray-900 p-3 rounded mb-4">
<p class="text-sm mb-2">👤 Conta</p>

<button onclick="login()" class="bg-green-600 w-full p-2 rounded mb-2">
Login Google
</button>

<button onclick="logout()" class="bg-red-600 w-full p-2 rounded">
Sair
</button>

<p id="userSidebar" class="text-xs mt-2"></p>
</div>

</div>

<!-- MAIN -->
<h1 class="text-xl font-bold mb-4 ml-10">💰 Controle de Gastos</h1>

<p id="userMain" class="ml-10 mb-4"></p>

<!-- FORM -->
<div class="bg-gray-800 p-4 rounded mb-4 ml-10">

<input id="desc" class="bg-gray-700 p-2 w-full rounded mb-2" placeholder="Descrição">

<select id="category" class="bg-gray-700 p-2 w-full rounded mb-2">
<option>💧 Água</option>
<option>🚌 Transporte</option>
<option>🏠 Contas</option>
<option>🍔 Alimentação</option>
<option>💡 Luz</option>
<option>💰 Saldo</option>
<option>📦 Outros</option>
</select>

<input id="value" type="number"
class="bg-gray-700 p-2 w-full rounded mb-2"
placeholder="Valor">

<button onclick="add()" class="bg-blue-600 w-full p-2 rounded">
Adicionar
</button>

</div>

<!-- RESUMO -->
<div class="grid grid-cols-2 gap-4 text-sm mb-4 ml-10">

<div class="bg-green-900 p-3 rounded">
Total entradas
<strong>R$ <span id="income">0</span></strong>
</div>

<div class="bg-red-900 p-3 rounded">
Total gastos
<strong>R$ <span id="expenses">0</span></strong>
</div>

<div class="bg-blue-900 p-3 rounded">
Saldo
<strong>R$ <span id="balance">0</span></strong>
</div>

<div class="bg-yellow-600 text-black p-3 rounded">
Dívida restante
<strong>R$ <span id="debt">0</span></strong>
</div>

</div>

<h2 class="ml-10 mb-2">📌 Lista</h2>
<div id="list" class="space-y-2 ml-10"></div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDeXJ_uSeaLgPKRUA1nCV7UFwEzpmiOmHc",
  authDomain: "meu-controle-financeiro-a0572.firebaseapp.com",
  projectId: "meu-controle-financeiro-a0572"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// DADOS
let userId = null;
let transactions = [];

// LOGIN (POPUP FUNCIONANDO NO VERCEL)
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .catch(err => {
      if (err.code === "auth/popup-blocked") {
        auth.signInWithRedirect(provider);
      }
    });
}

function logout(){
  auth.signOut();
}

// AUTH
auth.onAuthStateChanged(user => {

  const side = document.getElementById("userSidebar");
  const main = document.getElementById("userMain");

  if(user){
    userId = user.uid;

    side.innerText = "Logado: " + user.email;
    main.innerText = "Logado: " + user.email;

    load();
  } else {
    side.innerText = "Faça login";
    main.innerText = "Faça login";
  }
});

// SIDEBAR
function toggleSidebar(){
  sidebar.classList.toggle("-translate-x-full");
  overlay.classList.toggle("hidden");
}

function closeSidebar(){
  sidebar.classList.add("-translate-x-full");
  overlay.classList.add("hidden");
}

// ADD
function add(){

  const desc = document.getElementById("desc").value;
  const value = parseFloat(document.getElementById("value").value);
  const category = document.getElementById("category").value;

  if(!desc || isNaN(value)) return;

  transactions.push({
    id: Date.now(),
    desc,
    value,
    category,
    paid:false
  });

  save();
  render();
}

// TOGGLE
function togglePaid(id){
  const t = transactions.find(x=>x.id===id);
  if(t) t.paid = !t.paid;
  save();
  render();
}

// DELETE
function del(id){
  transactions = transactions.filter(t=>t.id!==id);
  save();
  render();
}

// SAVE
function save(){
  if(!userId) return;
  db.collection("users").doc(userId).set({transactions});
}

// LOAD
async function load(){
  const doc = await db.collection("users").doc(userId).get();
  if(doc.exists){
    transactions = doc.data().transactions || [];
  }
  render();
}

// RENDER
function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  let income=0, expenses=0;

  transactions.forEach(t=>{

    if(t.value>0) income+=t.value;
    else expenses+=t.value;

    let status="";

    if(t.value<0 && !t.paid)
      status=`<span class="text-red-400 font-bold">PENDENTE</span>`;

    if(t.paid)
      status=`<span class="text-green-400 font-bold">PAGO</span>`;

    list.innerHTML+=`
    <div class="bg-gray-800 p-2 rounded flex justify-between">
      <div>
        ${t.desc} (${t.category}) - R$ ${t.value}
        ${status}
      </div>
      <div class="flex gap-2">
        <button onclick="togglePaid(${t.id})">✔</button>
        <button onclick="del(${t.id})">❌</button>
      </div>
    </div>`;
  });

  document.getElementById("income").innerText = income.toFixed(2);
  document.getElementById("expenses").innerText = Math.abs(expenses).toFixed(2);
  document.getElementById("balance").innerText = (income+expenses).toFixed(2);
  document.getElementById("debt").innerText = Math.abs(expenses).toFixed(2);
}

render();

</script>

</body>
</html>
